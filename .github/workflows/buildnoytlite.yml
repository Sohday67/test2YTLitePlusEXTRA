name: Build IPA without YTLite
on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "YouTube"
        required: true
        type: string

      bundle_id:
        description: "Bundle ID (Optional)"
        default: "com.google.ios.youtube"
        required: true
        type: string

      demc:
        description: "Integrate DontEatMyContent"
        default: true
        required: false
        type: boolean

      ytvid:
        description: "Integrate YTVideoErrorAlert"
        default: true
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build IPA without YTLite
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Hide Sensitive Inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: bundle_id,display_name,demc,ytvid
          
      - name: Download and Validate IPA
        run: |
          wget "${{ inputs.ipa_url }}" --quiet --no-verbose -O youtube.ipa

          file_type=$(file --mime-type -b youtube.ipa)

          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Get YouTube Version 
        run: |
          unzip -q youtube.ipa -d ytextracted
          echo "YT_VERSION=$(grep -A 1 '<key>CFBundleVersion</key>' ytextracted/Payload/YouTube.app/Info.plist | grep '<string>' | awk -F'[><]' '{print $3}')" >> $GITHUB_ENV

      - name: Install Dependencies
        run: brew install make ldid swiftlint

      - name: Set PATH Environment Variables
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Clone Theos
        run: git clone --quiet --depth=1 --recurse-submodules https://github.com/theos/theos.git
           
      - name: Download iOS SDK
        run: |
          git clone --quiet --depth=1 -n --filter=tree:0 https://github.com/Tonwalter888/iOS-SDKs.git
          cd iOS-SDKs
          git sparse-checkout set --no-cone iPhoneOS18.6.sdk
          git checkout
          mv *.sdk $THEOS/sdks

      - name: Install cyan and tbd
        run: |
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          wget --quiet --no-verbose "https://github.com/inoahdev/tbd/releases/download/2.2/tbd-mac" -O /usr/local/bin/tbd
          chmod +x /usr/local/bin/tbd 
          
      - name: Clone Open in YouTube (Safari Extension)
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/BillyCurtis/OpenYouTubeSafariExtension.git
          cd OpenYouTubeSafariExtension
          git sparse-checkout set --no-cone OpenYouTubeSafariExtension.appex
          git checkout
          mv *.appex ${{ github.workspace }}

      - name: Clone YouTubeHeader
        run: |
           git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git $THEOS/include/YouTubeHeader
           if [ "${{ inputs.demc }}" = "true" ]; then
            cp -r "$THEOS/include/YouTubeHeader" "$THEOS/include/YTHeaders"
           fi

      - name: Clone PSHeader
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git $THEOS/include/PSHeader

      - name: Clone YouPiP
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouPiP.git


      - name: Clone YTUHD
        run: git clone --quiet --depth=1 https://github.com/Tonwalter888/YTUHD.git
           
      - name: Clone Return-YouTube-Dislikes
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/Return-YouTube-Dislikes.git

      - name: Clone YouGroupSettings
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouGroupSettings.git
           
      - name: Clone YTVideoOverlay
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git
          
      - name: Clone YouHideIsland
        run: git clone --quiet --depth=1 https://github.com/Sohday67/YouHideIsland.git YouHideIsland

      - name: Clone YTSkipSilence
        run: git clone --quiet --depth=1 https://github.com/Sohday67/test5silence.git YTSkipSilence

      - name: Clone YTABConfig
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTABConfig.git
                  
      - name: Clone YouQuality
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouQuality.git

      - name: Clone DontEatMyContent
        if: ${{ inputs.demc }}
        run: git clone --quiet --depth=1 https://github.com/therealFoxster/DontEatMyContent.git

      - name: Clone YouLoop
        run: git clone --quiet --depth=1 https://github.com/bhackel/YouLoop.git

      - name: Clone Alderis
        run: git clone --quiet --depth=1 https://github.com/hbang/Alderis.git

      - name: Clone YTSilentVote
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTSilentVote.git

      - name: Clone YouShare
        run: git clone --quiet --depth=1 https://github.com/Tonwalter888/YouShare.git

      - name: Clone YTweaks
        run: git clone --quiet --depth=1 https://github.com/fosterbarnes/YTweaks.git

      - name: Clone IAmYouTube
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/IAmYouTube.git

      - name: Clone YTVideoErrorAlert
        if: ${{ inputs.ytvid }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoErrorAlert.git

      - name: Build YouPiP
        run: |
          python3 - <<'PYCODE'
          from pathlib import Path
          import re
          import sys

          root = Path("YouPiP")
          legacy = root / "LegacyPiPCompat.x"
          settings = root / "Settings.x"
          makefile = root / "Makefile"

          if not legacy.exists() or not settings.exists():
              raise SystemExit("YouPiP source files were not found after cloning.")

          print("Patching YouPiP source for current Logos/clang compatibility...")

          legacy_text = legacy.read_text()
          before_legacy = legacy_text

          legacy_patterns = [
              (
                  r"return\s+initPlayerPiPControllerIfNeeded\(\s*%orig\s*,\s*delegate\s*,\s*nil\s*\);",
                  "YTPlayerPIPController *originalController = %orig;\n    return initPlayerPiPControllerIfNeeded(originalController, delegate, nil);",
              ),
              (
                  r"return\s+initPlayerPiPControllerIfNeeded\(\s*%orig\s*,\s*delegate\s*,\s*parentResponder\s*\);",
                  "YTPlayerPIPController *originalController = %orig;\n    return initPlayerPiPControllerIfNeeded(originalController, delegate, parentResponder);",
              ),
          ]

          for pattern, replacement in legacy_patterns:
              legacy_text, count = re.subn(pattern, replacement, legacy_text)
              if count == 0 and re.search(pattern.replace("return\\s+", ""), before_legacy):
                  raise SystemExit(f"Unable to patch YouPiP LegacyPiPCompat.x pattern: {pattern}")

          if re.search(r"initPlayerPiPControllerIfNeeded\(\s*%orig", legacy_text):
              raise SystemExit("YouPiP LegacyPiPCompat.x still contains an unsafe %orig call inside initPlayerPiPControllerIfNeeded().")

          if legacy_text != before_legacy:
              legacy.write_text(legacy_text)
              print("Patched LegacyPiPCompat.x unsafe %orig wrapper calls.")
          else:
              print("LegacyPiPCompat.x was already patched or upstream changed safely.")

          settings_text = settings.read_text()
          before_settings = settings_text
          settings_text, count = re.subn(
              r"NSMutableArray\s*\*\s*mutableCategories\s*=\s*%orig\.mutableCopy\s*;",
              "NSArray *originalCategories = %orig;\n    NSMutableArray *mutableCategories = originalCategories.mutableCopy;",
              settings_text,
          )
          if count == 0 and "%orig.mutableCopy" in before_settings:
              raise SystemExit("Unable to patch YouPiP Settings.x %orig.mutableCopy assignment.")

          if settings_text != before_settings:
              settings.write_text(settings_text)
              print("Patched Settings.x NSArray -> NSMutableArray conversion.")
          else:
              print("Settings.x was already patched or upstream changed safely.")

          if makefile.exists():
              make_text = makefile.read_text()
              flag_line = "$(TWEAK_NAME)_CFLAGS += -Wno-incompatible-pointer-types"
              if flag_line not in make_text:
                  makefile.write_text(make_text.rstrip() + "\n" + flag_line + "\n")
                  print("Added fallback clang flag for YouPiP pointer-type warnings.")

          print("YouPiP patch verification complete.")
          PYCODE
          cd YouPiP
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youpip.deb
      - name: Build YTUHD
        run: |
          python3 - <<'PYCODE'
          from pathlib import Path
          import re

          root = Path("YTUHD")
          files = [root / "Tweak.xm", root / "Filter.x"]
          missing = [str(p) for p in files if not p.exists()]
          if missing:
              raise SystemExit(f"YTUHD source files were not found after cloning: {missing}")

          def patch_common(path: Path, filter_func: str) -> bool:
              text = path.read_text()
              original = text

              filter_method_re = re.compile(
                  r"-\s*\(NSArray\s*\*\)\s*filterFormats:\s*\(NSArray\s*\*\)\s*formats\s*\{\s*return\s+"
                  + re.escape(filter_func)
                  + r"\s*\(\s*%orig\s*\)\s*;\s*\}",
                  re.S,
              )
              text = filter_method_re.sub(
                  "- (NSArray *)filterFormats:(NSArray *)formats {\n"
                  "    NSArray *originalFormats = %orig(formats);\n"
                  f"    return {filter_func}(originalFormats);\n"
                  "}",
                  text,
              )

              selectable_re = re.compile(
                  r"-\s*\(id\)\s*getSelectableFormatDataAndReturnError:\s*\(NSError\s*\*\*\)\s*error\s*\{\s*"
                  r'\[self\s+setValue:@\(NO\)\s+forKey:@"_postponePreferredFormatFiltering"\];\s*'
                  r"return\s+"
                  + re.escape(filter_func)
                  + r"\s*\(\s*%orig\s*\)\s*;\s*\}",
                  re.S,
              )
              text = selectable_re.sub(
                  "- (id)getSelectableFormatDataAndReturnError:(NSError **)error {\n"
                  '    [self setValue:@(NO) forKey:@"_postponePreferredFormatFiltering"];\n'
                  "    id originalData = %orig;\n"
                  "    if ([originalData isKindOfClass:[NSArray class]]) {\n"
                  f"        return {filter_func}(originalData);\n"
                  "    }\n"
                  "    return originalData;\n"
                  "}",
                  text,
              )

              literal_filter = f"- (NSArray *)filterFormats:(NSArray *)formats {{ return {filter_func}(%orig); }}"
              if literal_filter in text:
                  text = text.replace(
                      literal_filter,
                      "- (NSArray *)filterFormats:(NSArray *)formats {\n"
                      "    NSArray *originalFormats = %orig(formats);\n"
                      f"    return {filter_func}(originalFormats);\n"
                      "}",
                  )

              literal_selectable = (
                  f'- (id)getSelectableFormatDataAndReturnError:(NSError **)error {{ [self setValue:@(NO) forKey:@"_postponePreferredFormatFiltering"]; return {filter_func}(%orig); }}'
              )
              if literal_selectable in text:
                  text = text.replace(
                      literal_selectable,
                      "- (id)getSelectableFormatDataAndReturnError:(NSError **)error {\n"
                      '    [self setValue:@(NO) forKey:@"_postponePreferredFormatFiltering"];\n'
                      "    id originalData = %orig;\n"
                      "    if ([originalData isKindOfClass:[NSArray class]]) {\n"
                      f"        return {filter_func}(originalData);\n"
                      "    }\n"
                      "    return originalData;\n"
                      "}",
                  )

              unsafe = re.search(rf"{re.escape(filter_func)}\s*\(\s*%orig\s*\)", text)
              if unsafe:
                  context = text[max(0, unsafe.start()-120):unsafe.end()+120]
                  raise SystemExit(f"Unsafe %orig pattern remained in {path}: {context}")

              if text != original:
                  path.write_text(text)
                  return True
              return False

          changed_tweak = patch_common(files[0], "filteredFormats")
          changed_filter = patch_common(files[1], "filteredAlot")
          print(f"YTUHD patch status: Tweak.xm changed={changed_tweak}, Filter.x changed={changed_filter}")
          print("YTUHD patch verification passed.")
          PYCODE
          echo "Patched YTUHD source snippets:"
          grep -n -E "originalFormats|originalData|filteredFormats\(%orig|filteredAlot\(%orig" YTUHD/Tweak.xm YTUHD/Filter.x || true
          cd YTUHD
          make -j1 clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless ADDITIONAL_CFLAGS="-Wno-incompatible-pointer-types -Wno-error=incompatible-pointer-types"
          mv packages/*.deb ${{ github.workspace }}/ytuhd.deb

      - name: Build Return-YouTube-Dislikes
        run: |
          cd Return-YouTube-Dislikes
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ryd.deb

      - name: Build YouGroupSettings
        run: |
          cd YouGroupSettings
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ygs.deb

      - name: Build YTVideoOverlay
        run: |
          cd YTVideoOverlay
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytvo.deb

      - name: Build YouHideIsland
        run: |
          cd YouHideIsland
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youhideisland.deb

      - name: Build YTSkipSilence
        run: |
          cd YTSkipSilence
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytskipsilence.deb

      - name: Build YTABConfig
        run: |
          cd YTABConfig
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytabconfig.deb

      - name: Build YouQuality
        run: |
          cd YouQuality
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youquality.deb

      - name: Build DontEatMyContent
        if: ${{ inputs.demc }}
        run: |
          cd DontEatMyContent
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/demc.deb

      - name: Build YouLoop
        run: |
          cd YouLoop
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youloop.deb

      - name: Build Alderis
        run: |
          cd Alderis
          make clean package DEBUG=0 FINALPACKAGE=1 ARCHS=arm64
          mv packages/*.deb ${{ github.workspace }}/alderis.deb

      - name: Build YTSilentVote
        run: |
          cd YTSilentVote
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytnovote.deb  

      - name: Build YouShare
        run: |
          cd YouShare
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youshare.deb
          
      - name: Build YTweaks
        run: |
          cd YTweaks
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytweaks.deb

      - name: Build IAmYouTube
        run: |
          cd IAmYouTube
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/imyt.deb

      - name: Build YTVideoErrorAlert
        if: ${{ inputs.ytvid }}
        run: |
          cd YTVideoErrorAlert
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytvideoerror.deb

      - name: List Built Tweaks
        run: |
          echo "Built tweak packages:"
          ls -1 *.deb

      - name: Inject Tweaks Into IPA
        run: |
          tweaks="OpenYouTubeSafariExtension.appex"

          for f in *.deb; do
            tweaks="$tweaks $f"
          done
          
          cyan -i youtube.ipa -o YTLitePlusEXTRA_NoYTLite_${{ env.YT_VERSION }}.ipa -uwef $tweaks -n "${{ inputs.display_name }}" -b ${{ inputs.bundle_id }}

      - name: Create a Draft Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ytliteplusextra-ipa-noytlite${{ github.run_number }}
          name: YTLitePlusEXTRA_NoYTLite_${{ env.YT_VERSION }} (${{ github.run_number }}) 
          files: YTLitePlusEXTRA_NoYTLite_${{ env.YT_VERSION }}.ipa
          draft: true

      - name: Job Summary - Build Complete
        run: |
          echo -e '### 🛠️ Build IPA wtihout YTLite Complete!' >> $GITHUB_STEP_SUMMARY

      - name: Job Summary - Output the Draft Release Link
        run: |
          echo -e '### 🚀 Draft Release\n\nDraft release has been created successfully! You can view your release here: https://github.com/${{ github.repository }}/releases' >> $GITHUB_STEP_SUMMARY     
          
      - name: Job Summary - Cleanup
        run: |
          echo -e '### 🧹 Cleanup\n\nYou can remove previous GitHub Actions run here: https://github.com/${{ github.repository }}/actions/workflows/delete-old-workflows-run.yml And if you want to delelte old draft releases you have then here: https://github.com/${{ github.repository }}/actions/workflows/delete-old-draft-releases.yml' >> $GITHUB_STEP_SUMMARY
